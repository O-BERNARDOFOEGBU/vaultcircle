services:
  postgres:
    image: postgres:15
    container_name: vaultcircle_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vaultcircle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: vaultcircle_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/vaultcircle?schema=public
      JWT_SECRET: vaultcircle_super_secret_jwt_key_2024
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  postgres_data: